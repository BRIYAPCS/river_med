name: Deploy Backend → Linode

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when backend-related files change.
      # Pure frontend pushes will not trigger a server deploy.
      - 'backend/**'
      - 'deploy/deploy-backend.sh'
      - 'ecosystem.config.cjs'
      - '.github/workflows/deploy-backend.yml'

  # Allow manual trigger from the Actions tab (useful for force-redeploys)
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy to Linode
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Log context (no secrets printed) ──────────────────────────────────
      - name: Print deploy context
        run: |
          echo "Triggered by : ${{ github.actor }}"
          echo "Branch       : ${{ github.ref_name }}"
          echo "Commit SHA   : ${{ github.sha }}"
          echo "Commit msg   : ${{ github.event.head_commit.message }}"

      # ── 2. SSH in and call the deploy script ──────────────────────────────────
      # The script lives in the repo itself so it is always in sync with the code.
      # script_stop: true — any non-zero exit inside the script fails this step.
      - name: Run deploy script on Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.LINODE_HOST }}
          username:    ${{ secrets.LINODE_USER }}
          key:         ${{ secrets.LINODE_SSH_KEY }}
          passphrase:  ${{ secrets.LINODE_SSH_PASSPHRASE }}
          port:        ${{ secrets.LINODE_PORT }}
          script_stop: true
          script: |
            bash /home/briya/projects/river_med/deploy/deploy-backend.sh

      # ── 3. Annotate on failure ────────────────────────────────────────────────
      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error::Deployment failed — see SSH step output for details."
          echo "::notice::Rollback: SSH in and run the commands below."
          echo "::notice::  cd /home/briya/projects/river_med"
          echo "::notice::  git log --oneline -5"
          echo "::notice::  git reset --hard <previous-sha>"
          echo "::notice::  bash deploy/deploy-backend.sh"
