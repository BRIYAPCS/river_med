# River Med — nginx site config
# Install to: /etc/nginx/sites-available/rivermed
# Enable with: sudo ln -s /etc/nginx/sites-available/rivermed /etc/nginx/sites-enabled/
#
# Replace every occurrence of yourdomain.com with your actual domain before use.

# ── rate-limit zones (defined in http block, so place these in
#    /etc/nginx/nginx.conf inside the http {} block, or in a
#    separate /etc/nginx/conf.d/limits.conf file) ───────────────────────────────
# limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;
# limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=10r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let Certbot answer ACME challenges over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS (populated by Certbot) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # ── frontend static files ─────────────────────────────────────────────────
    root  /var/www/rivermed/frontend/dist;
    index index.html;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;

    # ── auth endpoints — strict rate limit ────────────────────────────────────
    location /api/auth/ {
        # limit_req zone=api_auth burst=5 nodelay;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── REST API proxy ────────────────────────────────────────────────────────
    location /api/ {
        # limit_req zone=api_general burst=20 nodelay;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Socket.IO proxy — WebSocket upgrade required ──────────────────────────
    # Socket.IO first polls over HTTP, then upgrades to WebSocket.
    # Both phases hit this location block.
    location /socket.io/ {
        proxy_pass             http://127.0.0.1:4000;
        proxy_http_version     1.1;

        # WebSocket upgrade headers
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";

        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        # Keep long-lived WebSocket connections alive.
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # ── immutable static assets (JS/CSS with content-hash filenames) ──────────
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA fallback — React Router client-side routing ───────────────────────
    # All non-file, non-api requests return index.html so the React app handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── block common attack paths ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
