# River Med — nginx API-server config
# Domain:  briya-api.duckdns.org
# Backend: Node.js on 127.0.0.1:4000 (PM2, fork mode)
# Frontend: hosted on Vercel — nginx only serves the API here.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/river-med
#   sudo ln -s /etc/nginx/sites-available/river-med /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: obtained with Certbot
#   sudo certbot --nginx -d briya-api.duckdns.org
#
# Rate-limit zones — add these inside the http {} block in /etc/nginx/nginx.conf
# (or in /etc/nginx/conf.d/limits.conf):
#   limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
#   limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name briya-api.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS API server ──────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name briya-api.duckdns.org;

    # ── TLS (populated by Certbot) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/briya-api.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/briya-api.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # ── /api/river/* — Vercel frontend uses this base URL ────────────────────
    # Strips /api/river and proxies to /api/* on the backend.
    # e.g. /api/river/auth/login → http://127.0.0.1:4000/api/auth/login
    location /api/river/ {
        # limit_req zone=api_general burst=20 nodelay;

        rewrite ^/api/river/(.*)$ /api/$1 break;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── /api/river/auth/* — tighter rate limit for auth endpoints ────────────
    # This block must come BEFORE the generic /api/river/ block above.
    location /api/river/auth/ {
        # limit_req zone=api_auth burst=5 nodelay;

        rewrite ^/api/river/(.*)$ /api/$1 break;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── /api/* — direct backend access (health checks, internal tools) ────────
    location /api/ {
        # limit_req zone=api_general burst=20 nodelay;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Socket.IO — WebSocket upgrade required ────────────────────────────────
    # Socket.IO starts with HTTP long-polling then upgrades to WebSocket.
    # VITE_SOCKET_URL=https://briya-api.duckdns.org (no path prefix).
    location /socket.io/ {
        proxy_pass             http://127.0.0.1:4000;
        proxy_http_version     1.1;

        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";

        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # ── block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── default — return 404 for anything else ────────────────────────────────
    location / {
        return 404 '{"error":"Not found"}';
        add_header Content-Type application/json;
    }
}
